<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МИФАРТ — Калькулятор каркасных домов и свай</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .mifart-gradient { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        .shadow-premium { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo } = React;

        const PILE_PRICES = { 76: 6000, 89: 7600, 108: 9800 };
        const PACKAGES = [
            { id: 'econom', name: 'Эконом', insulation: '100 мм', desc: 'Базовое утепление' },
            { id: 'standard', name: 'Стандарт', insulation: '100 мм', desc: 'Оптимальное для ПМЖ' },
            { id: 'premium', name: 'Премиум', insulation: '200 мм', desc: 'Максимальная энергоэффективность' }
        ];

        function App() {
            const [width, setWidth] = useState(6000);
            const [length, setLength] = useState(8000);
            const [diameter, setDiameter] = useState(89);
            const [pkg, setPkg] = useState('standard');
            const [type, setType] = useState('house');

            const pileCountX = Math.ceil(width / 3000) + 1;
            const pileCountY = Math.ceil(length / 3000) + 1;
            const totalPiles = pileCountX * pileCountY;
            const pileCost = totalPiles * PILE_PRICES[diameter];

            return (
                <div className="min-h-screen bg-slate-50 py-12 px-4">
                    <div className="max-w-5xl mx-auto bg-white rounded-3xl shadow-premium overflow-hidden flex flex-col md:flex-row">
                        <div className="p-8 md:w-3/5 space-y-8">
                            <div className="flex items-center gap-2">
                                <span className="text-3xl font-black text-slate-900 tracking-tighter">СПО</span>
                                <span className="bg-red-600 text-white px-2 py-1 rounded text-xs font-bold -rotate-2">МИФАРТ</span>
                            </div>
                            
                            <div className="space-y-6">
                                <div>
                                    <h2 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Тип проекта</h2>
                                    <div className="flex gap-4">
                                        {['house', 'bath'].map(t => (
                                            <button key={t} onClick={() => setType(t)} className={"flex-1 py-3 px-6 rounded-xl border-2 transition-all " + (type === t ? 'border-red-600 bg-red-50 text-red-600 font-bold' : 'border-slate-100 text-slate-500 hover:border-slate-200')}>
                                                {t === 'house' ? 'Жилой дом' : 'Баня'}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <h2 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Габариты (мм)</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" value={width} onChange={e => setWidth(Number(e.target.value))} className="bg-slate-50 border-0 rounded-xl p-4 focus:ring-2 focus:ring-red-600" placeholder="Ширина" />
                                        <input type="number" value={length} onChange={e => setLength(Number(e.target.value))} className="bg-slate-50 border-0 rounded-xl p-4 focus:ring-2 focus:ring-red-600" placeholder="Длина" />
                                    </div>
                                </div>

                                <div>
                                    <h2 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Комплектация</h2>
                                    <div className="space-y-3">
                                        {PACKAGES.map(p => (
                                            <div key={p.id} onClick={() => setPkg(p.id)} className={"p-4 rounded-xl border-2 cursor-pointer transition-all " + (pkg === p.id ? 'border-red-600 bg-red-50' : 'border-slate-100 hover:border-slate-200')}>
                                                <div className="flex justify-between items-center">
                                                    <span className="font-bold text-slate-800">{p.name}</span>
                                                    <span className="text-red-600 font-black text-sm">{p.insulation}</span>
                                                </div>
                                                <p className="text-xs text-slate-500">{p.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-slate-900 p-8 md:w-2/5 text-white flex flex-col justify-between">
                            <div>
                                <h2 className="text-xl font-bold mb-8">План фундамента</h2>
                                <div className="bg-white/10 rounded-2xl p-4 aspect-square flex items-center justify-center relative overflow-hidden">
                                     <svg viewBox="-20 -20 140 140" className="w-full h-full">
                                        {Array.from({length: pileCountX}).map((_, i) => 
                                            Array.from({length: pileCountY}).map((_, j) => (
                                                <circle key={i+'-'+j} cx={i * (100/(pileCountX-1))} cy={j * (100/(pileCountY-1))} r="3" fill="#ef4444" />
                                            ))
                                        )}
                                        <rect x="0" y="0" width="100" height="100" fill="none" stroke="white" strokeWidth="0.5" strokeDasharray="2" />
                                     </svg>
                                     <div className="absolute top-2 right-4 text-[10px] text-white/40 uppercase tracking-widest font-bold">Сверхточный расчет</div>
                                </div>
                                <div className="mt-8 space-y-2">
                                    <div className="flex justify-between text-slate-400 text-sm">
                                        <span>Всего свай:</span>
                                        <span className="text-white font-bold">{totalPiles} шт</span>
                                    </div>
                                    <div className="flex justify-between text-slate-400 text-sm">
                                        <span>Диаметр:</span>
                                        <div className="flex gap-2">
                                            {[76, 89, 108].map(d => (
                                                <button key={d} onClick={() => setDiameter(d)} className={"px-2 rounded " + (diameter === d ? 'bg-red-600 text-white' : 'bg-white/10')}>Ø{d}</button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-12">
                                <div className="flex justify-between items-end mb-6">
                                    <span className="text-slate-400">Итого:</span>
                                    <span className="text-4xl font-black">{pileCost.toLocaleString()} ₽</span>
                                </div>
                                <button className="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-xl font-bold transition-transform active:scale-95 shadow-lg shadow-red-900/20">
                                    Получить смету
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
